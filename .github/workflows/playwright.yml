name: Playwright tests

on:
  # Run after main build/deploy completes on master
  workflow_run:
    workflows: ["Build index"]
    types: [completed]
    branches: [master]
  # Also allow manual runs and a daily schedule to catch regressions
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily

jobs:
  test:
    # Only run smoke tests if the triggering build succeeded (or if triggered manually/scheduled)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://www.prskavec.net

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

