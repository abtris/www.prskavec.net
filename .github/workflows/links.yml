name: Link check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Check content links
        run: make links
