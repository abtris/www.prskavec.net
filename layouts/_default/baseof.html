<!doctype html>
<html lang="{{ site.Language.Locale | default "en" }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="antialiased">
    <div class="grain" aria-hidden="true"></div>
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ partial "search-overlay.html" . }}
    <script src="{{ "/js/search.js" | relURL }}" defer></script>
  </body>
</html>
