<header class="relative z-10 px-6 md:px-12 lg:px-20 pt-8 pb-6">
  <div class="flex items-baseline justify-between gap-6 flex-wrap">
    <div class="inline-flex items-baseline gap-3">
      <a href="{{ "/authors/abtris/" | relURL }}" class="display text-[1.6rem] md:text-3xl transition-colors hover:text-[color:var(--color-signal)]" aria-label="About Ladislav Prskavec">
        Ladislav <em class="italic">Prskavec</em>
      </a>
      <a href="{{ "/" | relURL }}" class="mono-label hover:text-[color:var(--color-paper)] transition-colors">/ prskavec.net</a>
    </div>

    <nav aria-label="Primary" class="flex items-center gap-5 md:gap-7">
      {{ $cur := .RelPermalink }}
      <a class="nav-link" data-active="{{ eq $cur "/" }}" href="{{ "/" | relURL }}">Index</a>
      <a class="nav-link" data-active="{{ hasPrefix $cur "/talk" }}" href="{{ "/talk/" | relURL }}">Talks</a>
      <a class="nav-link" data-active="{{ hasPrefix $cur "/post" }}" href="{{ "/post/" | relURL }}">Writing</a>
      <a class="nav-link" data-active="{{ hasPrefix $cur "/courses" }}" href="{{ "/courses/how-to-make-oncall/" | relURL }}">Oncall</a>
      <a class="nav-link" href="https://ybyr.net/podcast" target="_blank" rel="noopener">Podcast ↗</a>
    </nav>
  </div>
</header>
