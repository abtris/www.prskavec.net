<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" aria-labelledby="title desc" role="img" viewBox="0 0 1120 500"><title id="title">Three pillars of MCP design</title><desc id="desc">Discovery, iteration, and context are the three pillars of agent experience design for MCP servers.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.goal{font-size:21px;font-weight:700;fill:#d85a14}.body{font-size:18px;font-weight:500;fill:#5a6359}.num{font-size:48px;font-weight:700;fill:#fff5e3}</style></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><text x="560" y="44" class="body" text-anchor="middle">Design for AgentEx: the agent should discover, choose, call, recover, and finish.</text><g transform="translate(64 84)"><rect width="304" height="304" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="304" height="84" x="0" y="0" fill="#FF7023" rx="8"/><text x="48" y="60" class="num">1</text><text x="158" y="54" fill="#FFF5E3" font-size="29" font-weight="700" text-anchor="middle">Discovery</text><text x="152" y="130" class="goal" text-anchor="middle">Minimize token footprint</text><text x="152" y="184" class="body" text-anchor="middle">Few tools, clear names,</text><text x="152" y="212" class="body" text-anchor="middle">short descriptions,</text><text x="152" y="240" class="body" text-anchor="middle">obvious parameters.</text></g><g transform="translate(408 84)"><rect width="304" height="304" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="304" height="84" x="0" y="0" fill="#BD673D" rx="8"/><text x="48" y="60" class="num">2</text><text x="158" y="54" fill="#FFF5E3" font-size="29" font-weight="700" text-anchor="middle">Iteration</text><text x="152" y="130" class="goal" text-anchor="middle">Minimize turns to done</text><text x="152" y="184" class="body" text-anchor="middle">Return actionable errors,</text><text x="152" y="212" class="body" text-anchor="middle">stable IDs, examples,</text><text x="152" y="240" class="body" text-anchor="middle">and next-step hints.</text></g><g transform="translate(752 84)"><rect width="304" height="304" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="304" height="84" x="0" y="0" fill="#8FA596" rx="8"/><text x="48" y="60" class="num">3</text><text x="158" y="54" fill="#FFF5E3" font-size="29" font-weight="700" text-anchor="middle">Context</text><text x="152" y="130" class="goal" text-anchor="middle">All signal, no noise</text><text x="152" y="184" class="body" text-anchor="middle">Shape responses for the</text><text x="152" y="212" class="body" text-anchor="middle">agent&apos;s next prompt,</text><text x="152" y="240" class="body" text-anchor="middle">not for raw API parity.</text></g><rect width="660" height="52" x="230" y="426" fill="#2D2A27" rx="8"/><text x="560" y="460" fill="#FFF5E3" font-size="24" font-weight="700" text-anchor="middle">MCP is a UI replacement, not an API wrapper.</text></svg>