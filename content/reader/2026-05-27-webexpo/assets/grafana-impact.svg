<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Grafana incident response comparison</title>
  <desc id="desc">Human engineers took 28 minutes to root cause an incident. An AI assistant took 8 minutes, which is 3.5 times faster.</desc>
  <defs>
    <style>
      text { font-family: 'Familjen Grotesk', 'Segoe UI', Arial, sans-serif; letter-spacing: 0; }
      .big { font-size: 74px; font-weight: 700; }
      .label { font-size: 28px; font-weight: 700; }
      .small { font-size: 20px; font-weight: 500; fill: #5A6359; }
      .tiny { font-size: 16px; font-weight: 600; fill: #5A6359; }
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="500" rx="8" fill="none"/>
  <rect x="52" y="38" width="1016" height="374" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>

  <text class="label" x="96" y="104">Time to root cause</text>
  <text class="small" x="96" y="136">Same incident pattern, different level of context access</text>

  <line x1="150" y1="340" x2="934" y2="340" stroke="#D0C8BA" stroke-width="3"/>
  <line x1="150" y1="202" x2="934" y2="202" stroke="#FBEFD8" stroke-width="3"/>
  <line x1="150" y1="272" x2="934" y2="272" stroke="#FBEFD8" stroke-width="3"/>

  <g>
    <rect x="246" y="166" width="170" height="174" rx="8" fill="#D0C8BA"/>
    <text class="big" x="331" y="282" text-anchor="middle">28</text>
    <text class="label" x="331" y="374" text-anchor="middle">Human</text>
    <text class="small" x="331" y="402" text-anchor="middle">minutes</text>
  </g>

  <g>
    <rect x="648" y="290" width="170" height="50" rx="8" fill="#FF7023"/>
    <text class="big" x="733" y="282" text-anchor="middle" fill="#FF7023">8</text>
    <text class="label" x="733" y="374" text-anchor="middle">AI assistant</text>
    <text class="small" x="733" y="402" text-anchor="middle">minutes</text>
  </g>

  <g transform="translate(846 84)">
    <rect x="0" y="0" width="166" height="104" rx="8" fill="#2D2A27"/>
    <text x="83" y="48" text-anchor="middle" font-size="40" font-weight="700" fill="#FFF5E3">3.5x</text>
    <text x="83" y="78" text-anchor="middle" font-size="20" font-weight="700" fill="#FF7023">faster</text>
  </g>

  <circle cx="258" cy="454" r="8" fill="#BD673D"/>
  <text class="tiny" x="278" y="460">AI-generated code introduced the bug</text>
  <circle cx="630" cy="454" r="8" fill="#FF7023"/>
  <text class="tiny" x="650" y="460">AI-powered tools found the root cause</text>
</svg>
