<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" aria-labelledby="title desc" role="img" viewBox="0 0 1120 500"><title id="title">Grafana incident response comparison</title><desc id="desc">Human engineers took 28 minutes to root cause an incident. An AI assistant took 8 minutes, which is 3.5 times faster.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.big,.label{font-size:74px;font-weight:700}.label{font-size:28px}.small,.tiny{font-size:20px;font-weight:500;fill:#5a6359}.tiny{font-size:16px;font-weight:600}</style></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><rect width="1016" height="374" x="52" y="38" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="96" y="104" class="label">Time to root cause</text><text x="96" y="136" class="small">Same incident pattern, different level of context access</text><line x1="150" x2="934" y1="340" y2="340" stroke="#D0C8BA" stroke-width="3"/><line x1="150" x2="934" y1="202" y2="202" stroke="#FBEFD8" stroke-width="3"/><line x1="150" x2="934" y1="272" y2="272" stroke="#FBEFD8" stroke-width="3"/><g><rect width="170" height="174" x="246" y="166" fill="#D0C8BA" rx="8"/><text x="331" y="282" class="big" text-anchor="middle">28</text><text x="331" y="374" class="label" text-anchor="middle">Human</text><text x="331" y="402" class="small" text-anchor="middle">minutes</text></g><g><rect width="170" height="50" x="648" y="290" fill="#FF7023" rx="8"/><text x="733" y="282" fill="#FF7023" class="big" text-anchor="middle">8</text><text x="733" y="374" class="label" text-anchor="middle">AI assistant</text><text x="733" y="402" class="small" text-anchor="middle">minutes</text></g><g transform="translate(846 84)"><rect width="166" height="104" x="0" y="0" fill="#2D2A27" rx="8"/><text x="83" y="48" fill="#FFF5E3" font-size="40" font-weight="700" text-anchor="middle">3.5x</text><text x="83" y="78" fill="#FF7023" font-size="20" font-weight="700" text-anchor="middle">faster</text></g><circle cx="258" cy="454" r="8" fill="#BD673D"/><text x="278" y="460" class="tiny">AI-generated code introduced the bug</text><circle cx="630" cy="454" r="8" fill="#FF7023"/><text x="650" y="460" class="tiny">AI-powered tools found the root cause</text></svg>