<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" aria-labelledby="title desc" role="img" viewBox="0 0 1120 500"><title id="title">CLI versus MCP decision framework</title><desc id="desc">Two clean decision branches: local simple tools with shell access point to CLI; durable services needing discovery and boundaries point to MCP.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.q{font-size:23px;font-weight:700}.a{font-size:17px;font-weight:600;fill:#5a6359}.result{font-size:30px;font-weight:700}.small{font-size:17px;font-weight:600;fill:#5a6359}.branch{font-size:18px;font-weight:700;fill:#d85a14}.on-dark{fill:#fff5e3}.on-dark-muted{fill:#d0c8ba}</style><marker id="arrow-orange" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4"><path fill="#FF7023" d="M0,0 L8,4 L0,8 Z"/></marker><marker id="arrow-muted" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4"><path fill="#5A6359" d="M0,0 L8,4 L0,8 Z"/></marker></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><text x="74" y="42" class="branch">Use the simplest thing that works</text><rect width="250" height="96" x="72" y="58" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="197" y="98" class="q" text-anchor="middle">Local + simple?</text><text x="197" y="128" class="a" text-anchor="middle">files, git, one-off command</text><path stroke="#5A6359" stroke-linecap="round" stroke-width="3" marker-end="url(#arrow-muted)" d="M328 106 H384"/><text x="356" y="91" class="small" text-anchor="middle">yes</text><rect width="250" height="96" x="392" y="58" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="517" y="98" class="q" text-anchor="middle">Agent has shell?</text><text x="517" y="128" class="a" text-anchor="middle">trusted local runtime</text><path stroke="#FF7023" stroke-linecap="round" stroke-width="4" marker-end="url(#arrow-orange)" d="M648 106 H764"/><text x="706" y="91" fill="#D85A14" class="small" text-anchor="middle">yes</text><rect width="286" height="124" x="776" y="44" fill="#2D2A27" rx="8"/><text x="919" y="94" fill="#FFF5E3" class="result" text-anchor="middle">Consider CLI</text><text x="919" y="130" class="small on-dark-muted" text-anchor="middle">cheaper, faster, great</text><text x="919" y="154" class="small on-dark-muted" text-anchor="middle">for local one-offs</text><text x="74" y="228" class="branch">Reach for MCP when the capability becomes a product</text><rect width="250" height="96" x="72" y="244" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="197" y="284" class="q" text-anchor="middle">Need discovery?</text><text x="197" y="314" class="a" text-anchor="middle">schemas, descriptions, reuse</text><path stroke="#5A6359" stroke-linecap="round" stroke-width="3" marker-end="url(#arrow-muted)" d="M328 292 H384"/><text x="356" y="277" class="small" text-anchor="middle">yes</text><rect width="250" height="96" x="392" y="244" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="517" y="284" class="q" text-anchor="middle">Need boundaries?</text><text x="517" y="314" class="a" text-anchor="middle">remote, permissions, audit</text><path stroke="#FF7023" stroke-linecap="round" stroke-width="4" marker-end="url(#arrow-orange)" d="M648 292 H764"/><text x="706" y="277" fill="#D85A14" class="small" text-anchor="middle">yes</text><rect width="286" height="124" x="776" y="230" fill="#FF7023" rx="8"/><text x="919" y="280" fill="#FFF5E3" class="result" text-anchor="middle">MCP Shines</text><text x="919" y="316" class="small on-dark" text-anchor="middle">discoverable, reusable,</text><text x="919" y="340" class="small on-dark" text-anchor="middle">secure service access</text><rect width="872" height="62" x="124" y="402" fill="#FBEFD8" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="560" y="428" class="small" text-anchor="middle">Hybrid option: Code Mode for local scripts; MCP for durable service capabilities.</text><text x="560" y="452" class="small" text-anchor="middle">The goal is good agent work, not protocol purity.</text></svg>