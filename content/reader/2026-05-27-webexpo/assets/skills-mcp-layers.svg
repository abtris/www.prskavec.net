<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Skills and MCP as complementary layers</title>
  <desc id="desc">Skills teach an agent how to reason through workflows. MCP gives the agent typed access to services. CLI or code mode handles local execution.</desc>
  <defs>
    <style>
      text { font-family: 'Familjen Grotesk', 'Segoe UI', Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 30px; font-weight: 700; }
      .body { font-size: 21px; font-weight: 500; fill: #5A6359; }
      .small { font-size: 17px; font-weight: 600; fill: #5A6359; }
      .white { fill: #FFF5E3; }
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="500" rx="8" fill="none"/>

  <g transform="translate(62 54)">
    <rect x="0" y="0" width="454" height="372" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="30" y="42" width="394" height="82" rx="8" fill="#C5E4CC"/>
    <text class="title" x="227" y="82" text-anchor="middle">Skills</text>
    <text class="body" x="227" y="112" text-anchor="middle">teach how to work</text>
    <rect x="30" y="150" width="394" height="82" rx="8" fill="#FBEFD8"/>
    <text class="title" x="227" y="190" text-anchor="middle">Instructions</text>
    <text class="body" x="227" y="220" text-anchor="middle">workflows, heuristics, examples</text>
    <rect x="30" y="258" width="394" height="82" rx="8" fill="#F2CDC4"/>
    <text class="title" x="227" y="298" text-anchor="middle">Judgment</text>
    <text class="body" x="227" y="328" text-anchor="middle">when to use which tool</text>
  </g>

  <g transform="translate(604 54)">
    <rect x="0" y="0" width="454" height="372" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="30" y="42" width="394" height="82" rx="8" fill="#FF7023"/>
    <text class="title white" x="227" y="82" text-anchor="middle">MCP</text>
    <text x="227" y="112" text-anchor="middle" font-size="21" font-weight="500" fill="#FFF5E3">gives access to services</text>
    <rect x="30" y="150" width="394" height="82" rx="8" fill="#D85A14"/>
    <text class="title white" x="227" y="190" text-anchor="middle">Typed Tools</text>
    <text x="227" y="220" text-anchor="middle" font-size="21" font-weight="500" fill="#FFF5E3">schemas, validation, results</text>
    <rect x="30" y="258" width="394" height="82" rx="8" fill="#2D2A27"/>
    <text class="title white" x="227" y="298" text-anchor="middle">Boundaries</text>
    <text x="227" y="328" text-anchor="middle" font-size="21" font-weight="500" fill="#FFF5E3">permissions, remote execution</text>
  </g>

  <path d="M516 240 H604" stroke="#FF7023" stroke-width="6" stroke-linecap="round"/>
  <circle cx="560" cy="240" r="36" fill="#2D2A27"/>
  <text x="560" y="251" text-anchor="middle" font-size="28" font-weight="700" fill="#FFF5E3">+</text>

  <text class="title" x="560" y="474" text-anchor="middle">Skills teach the agent to think. MCP lets it act.</text>
</svg>
