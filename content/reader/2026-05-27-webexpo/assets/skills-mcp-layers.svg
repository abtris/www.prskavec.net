<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" aria-labelledby="title desc" role="img" viewBox="0 0 1120 500"><title id="title">Skills and MCP as complementary layers</title><desc id="desc">Skills teach an agent how to reason through workflows. MCP gives the agent typed access to services. CLI or code mode handles local execution.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.title{font-size:30px;font-weight:700}.body{font-size:21px;font-weight:500;fill:#5a6359}.white{fill:#fff5e3}</style></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><g transform="translate(62 54)"><rect width="454" height="372" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="394" height="82" x="30" y="42" fill="#C5E4CC" rx="8"/><text x="227" y="82" class="title" text-anchor="middle">Skills</text><text x="227" y="112" class="body" text-anchor="middle">teach how to work</text><rect width="394" height="82" x="30" y="150" fill="#FBEFD8" rx="8"/><text x="227" y="190" class="title" text-anchor="middle">Instructions</text><text x="227" y="220" class="body" text-anchor="middle">workflows, heuristics, examples</text><rect width="394" height="82" x="30" y="258" fill="#F2CDC4" rx="8"/><text x="227" y="298" class="title" text-anchor="middle">Judgment</text><text x="227" y="328" class="body" text-anchor="middle">when to use which tool</text></g><g transform="translate(604 54)"><rect width="454" height="372" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="394" height="82" x="30" y="42" fill="#FF7023" rx="8"/><text x="227" y="82" class="title white" text-anchor="middle">MCP</text><text x="227" y="112" fill="#FFF5E3" font-size="21" font-weight="500" text-anchor="middle">gives access to services</text><rect width="394" height="82" x="30" y="150" fill="#D85A14" rx="8"/><text x="227" y="190" class="title white" text-anchor="middle">Typed Tools</text><text x="227" y="220" fill="#FFF5E3" font-size="21" font-weight="500" text-anchor="middle">schemas, validation, results</text><rect width="394" height="82" x="30" y="258" fill="#2D2A27" rx="8"/><text x="227" y="298" class="title white" text-anchor="middle">Boundaries</text><text x="227" y="328" fill="#FFF5E3" font-size="21" font-weight="500" text-anchor="middle">permissions, remote execution</text></g><path stroke="#FF7023" stroke-linecap="round" stroke-width="6" d="M516 240 H604"/><circle cx="560" cy="240" r="36" fill="#2D2A27"/><text x="560" y="251" fill="#FFF5E3" font-size="28" font-weight="700" text-anchor="middle">+</text><text x="560" y="474" class="title" text-anchor="middle">Skills teach the agent to think. MCP lets it act.</text></svg>