<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" aria-labelledby="title desc" role="img" viewBox="0 -30 1120 560"><title id="title">The lethal trifecta</title><desc id="desc">Private data, untrusted content, and external communication combine into an exfiltration risk.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.center,.label{font-weight:700}.label{font-size:28px}.center{font-size:30px;fill:#fff5e3}</style></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><path fill="#FFF" stroke="#D0C8BA" stroke-width="3" d="M560 54 L930 418 H190 Z"/><path stroke="#FF7023" stroke-linecap="round" stroke-width="7" d="M560 54 L930 418"/><path stroke="#FF7023" stroke-linecap="round" stroke-width="7" d="M930 418 H190"/><path stroke="#FF7023" stroke-linecap="round" stroke-width="7" d="M190 418 L560 54"/><circle cx="560" cy="64" r="86" fill="#2D2A27"/><text x="560" y="55" fill="#FFF5E3" class="label" text-anchor="middle">Private</text><text x="560" y="91" fill="#FFF5E3" class="label" text-anchor="middle">Data</text><circle cx="190" cy="418" r="86" fill="#BD673D"/><text x="190" y="400" fill="#FFF5E3" class="label" text-anchor="middle">Untrusted</text><text x="190" y="436" fill="#FFF5E3" class="label" text-anchor="middle">Content</text><circle cx="930" cy="418" r="86" fill="#8FA596"/><text x="930" y="400" fill="#FFF5E3" class="label" text-anchor="middle">External</text><text x="930" y="436" fill="#FFF5E3" class="label" text-anchor="middle">Comms</text><rect width="324" height="120" x="398" y="218" fill="#FF7023" rx="8"/><text x="560" y="266" class="center" text-anchor="middle">Exfiltration</text><text x="560" y="304" class="center" text-anchor="middle">Risk</text></svg>