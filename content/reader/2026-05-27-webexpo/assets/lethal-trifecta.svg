<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 -30 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">The lethal trifecta</title>
  <desc id="desc">Private data, untrusted content, and external communication combine into an exfiltration risk.</desc>
  <defs>
    <style>
      text { font-family: 'Familjen Grotesk', 'Segoe UI', Arial, sans-serif; letter-spacing: 0; }
      .label { font-size: 28px; font-weight: 700; }
      .small { font-size: 18px; font-weight: 600; fill: #5A6359; }
      .center { font-size: 30px; font-weight: 700; fill: #FFF5E3; }
      .tiny { font-size: 14px; font-weight: 500; fill: #5A6359; }
      .on-dark { fill: #FFF5E3; }
      .on-dark-muted { fill: #D0C8BA; }
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="500" rx="8" fill="none"/>
  <path d="M560 54 L930 418 H190 Z" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="3"/>
  <path d="M560 54 L930 418" stroke="#FF7023" stroke-width="7" stroke-linecap="round"/>
  <path d="M930 418 H190" stroke="#FF7023" stroke-width="7" stroke-linecap="round"/>
  <path d="M190 418 L560 54" stroke="#FF7023" stroke-width="7" stroke-linecap="round"/>

  <circle cx="560" cy="64" r="86" fill="#2D2A27"/>
  <text class="label" x="560" y="55" text-anchor="middle" fill="#FFF5E3">Private</text>
  <text class="label" x="560" y="91" text-anchor="middle" fill="#FFF5E3">Data</text>

  <circle cx="190" cy="418" r="86" fill="#BD673D"/>
  <text class="label" x="190" y="400" text-anchor="middle" fill="#FFF5E3">Untrusted</text>
  <text class="label" x="190" y="436" text-anchor="middle" fill="#FFF5E3">Content</text>

  <circle cx="930" cy="418" r="86" fill="#8FA596"/>
  <text class="label" x="930" y="400" text-anchor="middle" fill="#FFF5E3">External</text>
  <text class="label" x="930" y="436" text-anchor="middle" fill="#FFF5E3">Comms</text>

  <rect x="398" y="218" width="324" height="120" rx="8" fill="#FF7023"/>
  <text class="center" x="560" y="266" text-anchor="middle">Exfiltration</text>
  <text class="center" x="560" y="304" text-anchor="middle">Risk</text>
</svg>
