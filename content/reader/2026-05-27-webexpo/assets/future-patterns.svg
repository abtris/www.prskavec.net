<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Emerging MCP patterns</title>
  <desc id="desc">Four emerging MCP patterns for 2026: Code Mode, MCP Apps, Tasks, and Elicitation, above a foundation of enterprise readiness and Linux Foundation governance.</desc>
  <defs>
    <style>
      text { font-family: 'Familjen Grotesk', 'Segoe UI', Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 28px; font-weight: 700; }
      .body { font-size: 19px; font-weight: 500; fill: #5A6359; }
      .small { font-size: 16px; font-weight: 700; fill: #5A6359; }
      .white { fill: #FFF5E3; }
    </style>
  </defs>
  <rect x="0" y="0" width="1120" height="500" rx="8" fill="none"/>

  <g transform="translate(50 50)">
    <rect x="0" y="0" width="242" height="238" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="0" y="0" width="242" height="72" rx="8" fill="#2D2A27"/>
    <text class="title white" x="121" y="46" text-anchor="middle">Code Mode</text>
    <text class="body" x="121" y="116" text-anchor="middle">Agent writes scripts</text>
    <text class="body" x="121" y="146" text-anchor="middle">for local execution.</text>
    <text class="small" x="121" y="198" text-anchor="middle">Less token traffic,</text>
    <text class="small" x="121" y="222" text-anchor="middle">faster loops.</text>
  </g>

  <g transform="translate(315 50)">
    <rect x="0" y="0" width="242" height="238" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="0" y="0" width="242" height="72" rx="8" fill="#FF7023"/>
    <text class="title white" x="121" y="46" text-anchor="middle">MCP Apps</text>
    <text class="body" x="121" y="116" text-anchor="middle">Tools return</text>
    <text class="body" x="121" y="146" text-anchor="middle">interactive HTML.</text>
    <text class="small" x="121" y="198" text-anchor="middle">Agent action,</text>
    <text class="small" x="121" y="222" text-anchor="middle">human inspection.</text>
  </g>

  <g transform="translate(580 50)">
    <rect x="0" y="0" width="242" height="238" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="0" y="0" width="242" height="72" rx="8" fill="#BD673D"/>
    <text class="title white" x="121" y="46" text-anchor="middle">Tasks</text>
    <text class="body" x="121" y="116" text-anchor="middle">Handle-based</text>
    <text class="body" x="121" y="146" text-anchor="middle">long-running ops.</text>
    <text class="small" x="121" y="198" text-anchor="middle">Poll or stream</text>
    <text class="small" x="121" y="222" text-anchor="middle">progress.</text>
  </g>

  <g transform="translate(845 50)">
    <rect x="0" y="0" width="242" height="238" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="0" y="0" width="242" height="72" rx="8" fill="#8FA596"/>
    <text class="title white" x="121" y="46" text-anchor="middle">Elicitation</text>
    <text class="body" x="121" y="116" text-anchor="middle">Pause for human</text>
    <text class="body" x="121" y="146" text-anchor="middle">approval or input.</text>
    <text class="small" x="121" y="198" text-anchor="middle">Best for sensitive</text>
    <text class="small" x="121" y="222" text-anchor="middle">operations.</text>
  </g>

  <rect x="50" y="346" width="1037" height="96" rx="8" fill="#2D2A27"/>
  <text class="title white" x="568" y="386" text-anchor="middle">Foundation: MCP becomes infrastructure</text>
  <text x="568" y="420" text-anchor="middle" font-size="20" font-weight="600" fill="#FFF5E3">Linux Foundation / AAIF governance, stateless protocol, SSO, audit trails, DPoP security</text>
</svg>
