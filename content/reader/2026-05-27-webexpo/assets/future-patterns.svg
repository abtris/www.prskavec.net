<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" aria-labelledby="title desc" role="img" viewBox="0 0 1120 500"><title id="title">Emerging MCP patterns</title><desc id="desc">Four emerging MCP patterns for 2026: Code Mode, MCP Apps, Tasks, and Elicitation, above a foundation of enterprise readiness and Linux Foundation governance.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.title{font-size:28px;font-weight:700}.body,.small{font-size:19px;font-weight:500;fill:#5a6359}.small{font-size:16px;font-weight:700}.white{fill:#fff5e3}</style></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><g transform="translate(50 50)"><rect width="242" height="238" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="242" height="72" x="0" y="0" fill="#2D2A27" rx="8"/><text x="121" y="46" class="title white" text-anchor="middle">Code Mode</text><text x="121" y="116" class="body" text-anchor="middle">Agent writes scripts</text><text x="121" y="146" class="body" text-anchor="middle">for local execution.</text><text x="121" y="198" class="small" text-anchor="middle">Less token traffic,</text><text x="121" y="222" class="small" text-anchor="middle">faster loops.</text></g><g transform="translate(315 50)"><rect width="242" height="238" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="242" height="72" x="0" y="0" fill="#FF7023" rx="8"/><text x="121" y="46" class="title white" text-anchor="middle">MCP Apps</text><text x="121" y="116" class="body" text-anchor="middle">Tools return</text><text x="121" y="146" class="body" text-anchor="middle">interactive HTML.</text><text x="121" y="198" class="small" text-anchor="middle">Agent action,</text><text x="121" y="222" class="small" text-anchor="middle">human inspection.</text></g><g transform="translate(580 50)"><rect width="242" height="238" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="242" height="72" x="0" y="0" fill="#BD673D" rx="8"/><text x="121" y="46" class="title white" text-anchor="middle">Tasks</text><text x="121" y="116" class="body" text-anchor="middle">Handle-based</text><text x="121" y="146" class="body" text-anchor="middle">long-running ops.</text><text x="121" y="198" class="small" text-anchor="middle">Poll or stream</text><text x="121" y="222" class="small" text-anchor="middle">progress.</text></g><g transform="translate(845 50)"><rect width="242" height="238" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="242" height="72" x="0" y="0" fill="#8FA596" rx="8"/><text x="121" y="46" class="title white" text-anchor="middle">Elicitation</text><text x="121" y="116" class="body" text-anchor="middle">Pause for human</text><text x="121" y="146" class="body" text-anchor="middle">approval or input.</text><text x="121" y="198" class="small" text-anchor="middle">Best for sensitive</text><text x="121" y="222" class="small" text-anchor="middle">operations.</text></g><rect width="1037" height="96" x="50" y="346" fill="#2D2A27" rx="8"/><text x="568" y="386" class="title white" text-anchor="middle">Foundation: MCP becomes infrastructure</text><text x="568" y="420" fill="#FFF5E3" font-size="20" font-weight="600" text-anchor="middle">Linux Foundation / AAIF governance, stateless protocol, SSO, audit trails, DPoP security</text></svg>