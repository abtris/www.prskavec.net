<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" aria-labelledby="title desc" role="img" viewBox="0 0 1120 500"><title id="title">MCP architecture</title><desc id="desc">AI host connects to an MCP server over JSON-RPC. The MCP server exposes typed tools to internal APIs, databases, logs, and services.</desc><defs><style>text{font-family:&apos;Familjen Grotesk&apos;,&apos;Segoe UI&apos;,Arial,sans-serif;letter-spacing:0}.label{font-size:28px;font-weight:700}.small{font-size:18px;font-weight:500;fill:#5a6359}.chip{font-size:16px;font-weight:700;fill:#fff5e3}</style><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4"><path fill="#FF7023" d="M0,0 L8,4 L0,8 Z"/></marker><marker id="arrow-dark" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4"><path fill="#2D2A27" d="M0,0 L8,4 L0,8 Z"/></marker></defs><rect width="1120" height="500" x="0" y="0" fill="none" rx="8"/><g transform="translate(44 100)"><rect width="270" height="250" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><rect width="222" height="62" x="24" y="26" fill="#2D2A27" rx="8"/><text x="135" y="66" fill="#FFF5E3" class="label" text-anchor="middle">AI Host</text><text x="135" y="128" class="small" text-anchor="middle">Claude, Cursor,</text><text x="135" y="156" class="small" text-anchor="middle">ChatGPT, IDE agent</text><path fill="#FBEFD8" stroke="#D0C8BA" d="M78 188 h114 a20 20 0 0 1 20 20 v0 a20 20 0 0 1 -20 20 h-114 a20 20 0 0 1 -20 -20 v0 a20 20 0 0 1 20 -20z"/><text x="135" y="215" class="small" text-anchor="middle">reasoning</text></g><g transform="translate(420 70)"><rect width="280" height="310" x="0" y="0" fill="#FF7023" rx="8"/><text x="140" y="60" fill="#FFF5E3" class="label" text-anchor="middle">MCP Server</text><text x="140" y="96" fill="#FFF5E3" font-size="19" font-weight="500" text-anchor="middle">Go binary exposing capabilities</text><rect width="208" height="48" x="36" y="128" fill="#D85A14" rx="8"/><text x="140" y="158" class="chip" text-anchor="middle">typed tool schemas</text><rect width="208" height="48" x="36" y="190" fill="#BD673D" rx="8"/><text x="140" y="220" class="chip" text-anchor="middle">validation boundary</text><rect width="208" height="48" x="36" y="252" fill="#2D2A27" rx="8"/><text x="140" y="282" class="chip" text-anchor="middle">audit + permissions</text></g><g transform="translate(806 88)"><rect width="270" height="278" x="0" y="0" fill="#FFF" stroke="#D0C8BA" stroke-width="2" rx="8"/><text x="135" y="56" class="label" text-anchor="middle">Your Systems</text><g transform="translate(34 92)"><rect width="92" height="52" x="0" y="0" fill="#C5E4CC" rx="8"/><text x="46" y="33" class="small" text-anchor="middle">DB</text><rect width="92" height="52" x="110" y="0" fill="#F2CDC4" rx="8"/><text x="156" y="33" class="small" text-anchor="middle">CMS</text><rect width="92" height="52" x="0" y="70" fill="#FBEFD8" rx="8"/><text x="46" y="103" class="small" text-anchor="middle">Logs</text><rect width="92" height="52" x="110" y="70" fill="#D0C8BA" rx="8"/><text x="156" y="103" class="small" text-anchor="middle">APIs</text><rect width="92" height="48" x="55" y="132" fill="#FBF0DC" rx="8"/><text x="101" y="162" class="small" text-anchor="middle">Tests</text></g></g><path stroke="#FF7023" stroke-linecap="round" stroke-width="4" marker-end="url(#arrow)" d="M324 210 H408"/><path stroke="#FF7023" stroke-linecap="round" stroke-width="4" marker-end="url(#arrow)" d="M710 210 H794"/><path stroke="#2D2A27" stroke-linecap="round" stroke-width="3" marker-end="url(#arrow-dark)" d="M408 266 H324"/><path stroke="#2D2A27" stroke-linecap="round" stroke-width="3" marker-end="url(#arrow-dark)" d="M794 266 H710"/><text x="367" y="185" class="small" text-anchor="middle">JSON-RPC</text><text x="753" y="185" class="small" text-anchor="middle">tool calls</text><text x="367" y="304" class="small" text-anchor="middle">results</text><text x="753" y="304" class="small" text-anchor="middle">data</text><text x="560" y="444" class="small" text-anchor="middle">MCP standardizes the middle layer: discovery, schemas, transport, and execution boundaries.</text></svg>