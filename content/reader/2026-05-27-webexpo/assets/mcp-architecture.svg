<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">MCP architecture</title>
  <desc id="desc">AI host connects to an MCP server over JSON-RPC. The MCP server exposes typed tools to internal APIs, databases, logs, and services.</desc>
  <defs>
    <style>
      text { font-family: 'Familjen Grotesk', 'Segoe UI', Arial, sans-serif; letter-spacing: 0; }
      .label { font-size: 28px; font-weight: 700; }
      .small { font-size: 18px; font-weight: 500; fill: #5A6359; }
      .chip { font-size: 16px; font-weight: 700; fill: #FFF5E3; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FF7023"/>
    </marker>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2D2A27"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1120" height="500" rx="8" fill="none"/>

  <g transform="translate(44 100)">
    <rect x="0" y="0" width="270" height="250" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <rect x="24" y="26" width="222" height="62" rx="8" fill="#2D2A27"/>
    <text class="label" x="135" y="66" text-anchor="middle" fill="#FFF5E3">AI Host</text>
    <text class="small" x="135" y="128" text-anchor="middle">Claude, Cursor,</text>
    <text class="small" x="135" y="156" text-anchor="middle">ChatGPT, IDE agent</text>
    <path d="M78 188 h114 a20 20 0 0 1 20 20 v0 a20 20 0 0 1 -20 20 h-114 a20 20 0 0 1 -20 -20 v0 a20 20 0 0 1 20 -20z" fill="#FBEFD8" stroke="#D0C8BA"/>
    <text class="small" x="135" y="215" text-anchor="middle">reasoning</text>
  </g>

  <g transform="translate(420 70)">
    <rect x="0" y="0" width="280" height="310" rx="8" fill="#FF7023"/>
    <text class="label" x="140" y="60" text-anchor="middle" fill="#FFF5E3">MCP Server</text>
    <text x="140" y="96" text-anchor="middle" font-size="19" font-weight="500" fill="#FFF5E3">Go binary exposing capabilities</text>
    <rect x="36" y="128" width="208" height="48" rx="8" fill="#D85A14"/>
    <text class="chip" x="140" y="158" text-anchor="middle">typed tool schemas</text>
    <rect x="36" y="190" width="208" height="48" rx="8" fill="#BD673D"/>
    <text class="chip" x="140" y="220" text-anchor="middle">validation boundary</text>
    <rect x="36" y="252" width="208" height="48" rx="8" fill="#2D2A27"/>
    <text class="chip" x="140" y="282" text-anchor="middle">audit + permissions</text>
  </g>

  <g transform="translate(806 88)">
    <rect x="0" y="0" width="270" height="278" rx="8" fill="#FFFFFF" stroke="#D0C8BA" stroke-width="2"/>
    <text class="label" x="135" y="56" text-anchor="middle">Your Systems</text>
    <g transform="translate(34 92)">
      <rect x="0" y="0" width="92" height="52" rx="8" fill="#C5E4CC"/>
      <text class="small" x="46" y="33" text-anchor="middle">DB</text>
      <rect x="110" y="0" width="92" height="52" rx="8" fill="#F2CDC4"/>
      <text class="small" x="156" y="33" text-anchor="middle">CMS</text>
      <rect x="0" y="70" width="92" height="52" rx="8" fill="#FBEFD8"/>
      <text class="small" x="46" y="103" text-anchor="middle">Logs</text>
      <rect x="110" y="70" width="92" height="52" rx="8" fill="#D0C8BA"/>
      <text class="small" x="156" y="103" text-anchor="middle">APIs</text>
      <rect x="55" y="132" width="92" height="48" rx="8" fill="#FBF0DC"/>
      <text class="small" x="101" y="162" text-anchor="middle">Tests</text>
    </g>
  </g>

  <path d="M324 210 H408" stroke="#FF7023" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M710 210 H794" stroke="#FF7023" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M408 266 H324" stroke="#2D2A27" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-dark)"/>
  <path d="M794 266 H710" stroke="#2D2A27" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-dark)"/>
  <text class="small" x="367" y="185" text-anchor="middle">JSON-RPC</text>
  <text class="small" x="753" y="185" text-anchor="middle">tool calls</text>
  <text class="small" x="367" y="304" text-anchor="middle">results</text>
  <text class="small" x="753" y="304" text-anchor="middle">data</text>

  <text class="small" x="560" y="444" text-anchor="middle">MCP standardizes the middle layer: discovery, schemas, transport, and execution boundaries.</text>
</svg>
