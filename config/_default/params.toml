# Site-wide params for the prskavec.net Hugo theme.

# Description — used by <meta name="description">, Open Graph, Twitter Card,
# llms.txt, and the RSS <description>.
description = "Personal site of Ladislav Prskavec — Software Engineer & Site Reliability Engineer in Prague. Writing, conference talks, an OnCall design guide, and the You Build It You Run It podcast."

# Twitter / X handle (no @) — used for twitter:site and twitter:creator
# meta tags. Empty disables the tags.
twitter = "abtris"

# Substack publication (host only) — the email-subscription path for readers
# who don't use RSS. Rendered in the footer and the end-of-post subscribe
# line. Empty disables both.
substack = "abtris.substack.com"

# Contact details. `email` is rendered on the about page and used as the
# RSS <managingEditor> / <webMaster>. `address` powers the location line
# on the about page vitals card.
email = "ladislav@prskavec.net"
address = "Prague, Czech Republic"

# Algolia search config — consumed by algolia.go to push the search index.
# (No search UI in the new theme yet; the index is still built externally.)
[search.algolia]
  app_id = "MVMZX0V323"
  api_key = "fb75ba39d4a2a4dbd39e69a66cff0777"
  index_name = "blog_hugo"
