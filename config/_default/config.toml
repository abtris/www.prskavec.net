# Hugo site configuration for prskavec.net.
# Docs: https://gohugo.io/getting-started/configuration/

# Title of your site
title = "Prskavec.Net"

# The URL of your site (end with a trailing slash)
baseURL = "https://www.prskavec.net/"

# Copyright notice — used in the footer + RSS <copyright>
copyright = "&copy; {year} Ladislav Prskavec"

# Get last modified date for content from Git
enableGitInfo = false

# Emit a /robots.txt from layouts/robots.txt
enableRobotsTXT = true

# Default language
defaultContentLanguage = "en"
hasCJKLanguage = false
defaultContentLanguageInSubdir = false
removePathAccents = true  # https://github.com/gohugoio/hugo/issues/5687

enableEmoji = false
footnotereturnlinkcontents = "<sup>^</sup>"
ignoreFiles = ["\\.ipynb$", ".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_files$", "_cache$"]
ignoreLogs = ['warning-goldmark-raw-html']

[pagination]
  pagerSize = 10

[outputs]
  home = [ "HTML", "RSS", "JSON", "LLMS" ]
  section = [ "HTML", "RSS" ]

# Google Analytics 4 — emitted by the internal template in head.html,
# production builds only (HUGO_ENV=production, set in netlify.toml).
[services]
  [services.googleAnalytics]
    ID = "G-YGZB4EL45B"

# Custom output format for /llms.txt — see https://llmstxt.org
[outputFormats]
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  # Substack-ready export of a post — clean HTML with absolute URLs for
  # copy-pasting into the Substack editor. Rendered per post as
  # <post>/substack.html via the cascade in content/post/_index.md.
  [outputFormats.SUBSTACK]
    mediaType = "text/html"
    baseName = "substack"
    isHTML = true
    notAlternative = true

# Markdown rendering knobs (consulted by legacy BlackFriday paths; Goldmark
# is the default renderer and inherits most defaults).
[blackfriday]
  hrefTargetBlank = true
  angledQuotes = false
  latexDashes = true
  extensions = ["backslashLineBreak"]

[imaging]
  resampleFilter = "lanczos"
  quality = 90
  anchor = "smart"

# Taxonomies — `authors` powers the about page at /authors/abtris/;
# tag / category drive the /tags/ and /categories/ archive pages.
[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
